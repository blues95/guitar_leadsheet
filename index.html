        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap');
        .light{
          --bg:#F4F5F6; --panel:#FFFFFF; --sheet:#FFFFFF; --field:#FFFFFF;
          --ink:#17191C; --mut:#878E96; --line:#E3E5E8; --hover:#F0F1F3;
          --accent:#E5352B; --on-accent:#FFFFFF;
        }
        .dark{
          --bg:#0E1013; --panel:#14161A; --sheet:#171A1F; --field:#14161A;
          --ink:#E9EBEE; --mut:#8A9098; --line:#272B31; --hover:#1D2126;
          --accent:#F0524A; --on-accent:#FFFFFF;
        }
        .app{font-family:'IBM Plex Sans KR','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
             background:var(--bg); color:var(--ink); min-height:100vh;}
        .app,.topbar,.sheet,.btn,.sel,.ed,.meta-in,.seg,.tabbar,.helpbox,.modal{
             transition:background-color .18s ease,color .18s ease,border-color .18s ease;}
        .topbar{background:var(--panel); border-bottom:1px solid var(--line);}
        .btn{border:1px solid var(--line); background:transparent; border-radius:6px; padding:7px 13px;
             font-weight:600; font-size:12.5px; color:var(--ink); cursor:pointer; white-space:nowrap;}
        .btn:hover{background:var(--hover);}
        .btn:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
        .btn:disabled{opacity:.45; cursor:default;}
        .btn-primary{background:var(--ink); border-color:var(--ink); color:var(--bg);}
        .btn-primary:hover{opacity:.86; background:var(--ink);}
        .sel{border:1px solid var(--line); background:var(--field); border-radius:6px; padding:7px 9px;
             font-weight:600; font-size:12.5px; color:var(--ink); cursor:pointer;}
        .sel:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
        .ctl{display:flex; flex-direction:column; gap:3px;}
        .ctl > label{font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--mut); text-transform:uppercase;}
        .seg{display:inline-flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--field);}
        .seg button{border:none; background:transparent; padding:7px 11px; font-size:13px; font-weight:700;
             color:var(--ink); cursor:pointer;}
        .seg button:hover{background:var(--hover);}
        .seg button.on{background:var(--ink); color:var(--bg);}
        .seg .val{padding:7px 10px; font-weight:800; font-family:'Archivo',sans-serif; min-width:40px;
             text-align:center; border-left:1px solid var(--line); border-right:1px solid var(--line);
             cursor:pointer; font-size:12.5px; color:var(--ink);}
        .seg .val.hot{color:var(--accent);}
        .hint{font-size:12px; color:var(--mut); font-weight:600;}
        .meta-in{width:100%; border:1px solid var(--line); border-radius:6px; background:var(--field);
             padding:8px 12px; font-size:14px; font-weight:600; color:var(--ink);}
        .meta-in::placeholder{color:var(--mut); font-weight:500;}
        .meta-in:focus{outline:1.5px solid var(--ink); outline-offset:1px; border-color:transparent;}
        .ed{width:100%; min-height:430px; resize:vertical; background:var(--field); border:1px solid var(--line);
            border-radius:8px; padding:14px 16px; color:var(--ink);
            font:13.5px/1.85 ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
        .ed:focus{outline:1.5px solid var(--ink); outline-offset:1px; border-color:transparent;}
        .tiny{font-size:12px; color:var(--mut); background:none; border:none; cursor:pointer;
              padding:2px 4px; font-weight:600;}
        .tiny:hover{color:var(--ink); text-decoration:underline;}
        .helpbox{border:1px solid var(--line); border-radius:8px; background:var(--hover);
              padding:12px 14px; font-size:12.5px; line-height:2; color:var(--ink);}
        .helpbox code{background:var(--panel); border:1px solid var(--line); border-radius:4px;
              padding:1px 6px; font:12px ui-monospace,Menlo,monospace; color:var(--accent);}
        .tabbar{display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--field);}
        .tabbar button{flex:1; border:none; background:transparent; padding:9px 0; font-size:13px;
              font-weight:700; color:var(--mut); cursor:pointer;}
        .tabbar button.on{background:var(--ink); color:var(--bg);}
        /* \u2500\u2500 \uC545\uBCF4 \uC2DC\uD2B8 \u2500\u2500 */
        .sheet{background:var(--sheet); border:1px solid var(--line); border-radius:6px;
               padding:clamp(24px,4.5vw,44px); line-height:1.5; color:var(--ink);}
        .sheet-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
        .light .sheet{box-shadow:0 1px 2px rgba(18,22,28,.05);}
        .sheet-head{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap;}
        .sh-title{font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:800;
               font-size:1.8em; line-height:1.12; letter-spacing:-.02em; margin:0;}
        .sh-artist{margin:4px 0 0; color:var(--mut); font-size:.8em; font-weight:500;}
        .ghosty{opacity:.55; font-style:italic;}
        .sh-meta{display:flex; gap:16px; text-align:right;}
        .sh-meta span{display:block; font-size:.52em; font-weight:700; letter-spacing:.14em;
               text-transform:uppercase; color:var(--mut);}
        .sh-meta b{display:block; font-family:'Archivo',sans-serif; font-weight:800; font-size:1em; color:var(--accent);}
        .sh-rule{border-top:2px solid var(--ink); margin:.8em 0 1.6em;}
        .sh-sect{margin:1.5em 0 .9em;}
        .sh-sect span{display:inline-block; background:var(--accent); color:var(--on-accent); border-radius:2px;
               padding:2.5px 10px; font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:700;
               font-size:.66em; letter-spacing:.1em; text-transform:uppercase;}
        .sh-gap{height:1em;}
        .sh-empty{color:var(--mut); font-size:.85em; margin:1.5em 0;}
        .m-row{display:flex; align-items:stretch; margin-bottom:1.35em;}
        .meas{flex:1; min-width:0; border-left:1px solid var(--ink);
              padding:.15em .55em .1em .6em; display:flex; flex-direction:column; justify-content:flex-end;}
        .meas-ch{display:flex; align-items:flex-end; gap:.35em;}
        .rep-l + .meas{border-left:none;}
        .bar-end{width:0; border-left:1px solid var(--ink);}
        .bar-end.dbl{width:5px; border-left:1px solid var(--ink); border-right:3px solid var(--ink);}
        .pdf-stage .sheet{padding:40px 44px; border:none; box-shadow:none; border-radius:0;}
        /* \u2500\u2500 \uB3C4\uB3CC\uC774\uD45C \u2500\u2500 */
        .rep-l{width:10px; border-left:3.2px solid var(--ink); position:relative; flex:none;}
        .rep-l::before{content:""; position:absolute; left:1.6px; top:0; bottom:0; width:1px; background:var(--ink);}
        .rep-r{width:10px; border-right:3.2px solid var(--ink); position:relative; flex:none;}
        .rep-r::before{content:""; position:absolute; right:1.6px; top:0; bottom:0; width:1px; background:var(--ink);}
