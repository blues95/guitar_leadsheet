        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap');
        .light{
          --bg:#F4F5F6; --panel:#FFFFFF; --sheet:#FFFFFF; --field:#FFFFFF;
          --ink:#17191C; --mut:#878E96; --line:#E3E5E8; --hover:#F0F1F3;
          --accent:#E5352B; --on-accent:#FFFFFF;
        }
        .dark{
          --bg:#0E1013; --panel:#14161A; --sheet:#171A1F; --field:#14161A;
          --ink:#E9EBEE; --mut:#8A9098; --line:#272B31; --hover:#1D2126;
          --accent:#F0524A; --on-accent:#FFFFFF;
        }
        .app{font-family:'IBM Plex Sans KR','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
             background:var(--bg); color:var(--ink); min-height:100vh;}
        .app,.topbar,.sheet,.btn,.sel,.ed,.meta-in,.seg,.tabbar,.helpbox,.modal{
             transition:background-color .18s ease,color .18s ease,border-color .18s ease;}
        .topbar{background:var(--panel); border-bottom:1px solid var(--line);}
        .btn{border:1px solid var(--line); background:transparent; border-radius:6px; padding:7px 13px;
             font-weight:600; font-size:12.5px; color:var(--ink); cursor:pointer; white-space:nowrap;}
        .btn:hover{background:var(--hover);}
        .btn:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
        .btn:disabled{opacity:.45; cursor:default;}
        .btn-primary{background:var(--ink); border-color:var(--ink); color:var(--bg);}
        .btn-primary:hover{opacity:.86; background:var(--ink);}
        .sel{border:1px solid var(--line); background:var(--field); border-radius:6px; padding:7px 9px;
             font-weight:600; font-size:12.5px; color:var(--ink); cursor:pointer;}
        .sel:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
        .ctl{display:flex; flex-direction:column; gap:3px;}
        .ctl > label{font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--mut); text-transform:uppercase;}
        .seg{display:inline-flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--field);}
        .seg button{border:none; background:transparent; padding:7px 11px; font-size:13px; font-weight:700;
             color:var(--ink); cursor:pointer;}
        .seg button:hover{background:var(--hover);}
        .seg button.on{background:var(--ink); color:var(--bg);}
        .seg .val{padding:7px 10px; font-weight:800; font-family:'Archivo',sans-serif; min-width:40px;
             text-align:center; border-left:1px solid var(--line); border-right:1px solid var(--line);
             cursor:pointer; font-size:12.5px; color:var(--ink);}
        .seg .val.hot{color:var(--accent);}
        .hint{font-size:12px; color:var(--mut); font-weight:600;}
        .meta-in{width:100%; border:1px solid var(--line); border-radius:6px; background:var(--field);
             padding:8px 12px; font-size:14px; font-weight:600; color:var(--ink);}
        .meta-in::placeholder{color:var(--mut); font-weight:500;}
        .meta-in:focus{outline:1.5px solid var(--ink); outline-offset:1px; border-color:transparent;}
        .ed{width:100%; min-height:430px; resize:vertical; background:var(--field); border:1px solid var(--line);
            border-radius:8px; padding:14px 16px; color:var(--ink);
            font:13.5px/1.85 ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
        .ed:focus{outline:1.5px solid var(--ink); outline-offset:1px; border-color:transparent;}
        .tiny{font-size:12px; color:var(--mut); background:none; border:none; cursor:pointer;
              padding:2px 4px; font-weight:600;}
        .tiny:hover{color:var(--ink); text-decoration:underline;}
        .helpbox{border:1px solid var(--line); border-radius:8px; background:var(--hover);
              padding:12px 14px 14px; font-size:12.5px; line-height:1.6; color:var(--ink);}
        .hb-t{font-size:10px; font-weight:700; letter-spacing:.09em; color:var(--mut);
              text-transform:uppercase; margin:12px 0 5px;}
        .hb-t:first-child{margin-top:0;}
        .hb-row{display:flex; gap:10px; align-items:baseline; margin:4px 0;}
        .hb-row > code{flex:none;}
        .hb-row > span{flex:1; min-width:0;}
        .helpbox code{background:var(--panel); border:1px solid var(--line); border-radius:4px;
              padding:1px 6px; font:12px ui-monospace,Menlo,monospace; color:var(--accent);}
        .tabbar{display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--field);}
        .tabbar button{flex:1; border:none; background:transparent; padding:9px 0; font-size:13px;
              font-weight:700; color:var(--mut); cursor:pointer;}
        .tabbar button.on{background:var(--ink); color:var(--bg);}
        /* \u2500\u2500 \uC545\uBCF4 \uC2DC\uD2B8 \u2500\u2500 */
        .sheet{background:var(--sheet); border:1px solid var(--line); border-radius:6px;
               padding:clamp(24px,4.5vw,44px); line-height:1.5; color:var(--ink);}
        .sheet-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
        .light .sheet{box-shadow:0 1px 2px rgba(18,22,28,.05);}
        .sheet-head{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap;}
        .sh-title{font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:800;
               font-size:1.8em; line-height:1.12; letter-spacing:-.02em; margin:0;}
        .sh-artist{margin:4px 0 0; color:var(--mut); font-size:.8em; font-weight:500;}
        .ghosty{opacity:.55; font-style:italic;}
        .sh-meta{display:flex; gap:16px; text-align:right;}
        .sh-meta span{display:block; font-size:.52em; font-weight:700; letter-spacing:.14em;
               text-transform:uppercase; color:var(--mut);}
        .sh-meta b{display:block; font-family:'Archivo',sans-serif; font-weight:800; font-size:1em; color:var(--accent);}
        .sh-rule{border-top:2px solid var(--ink); margin:.8em 0 1.6em;}
        .sh-sect{margin:1.5em 0 .9em;}
        .sh-sect span{display:inline-block; background:var(--accent); color:var(--on-accent); border-radius:2px;
               padding:2.5px 10px; font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:700;
               font-size:.66em; letter-spacing:.1em; text-transform:uppercase;}
        .sh-gap{height:1em;}
        .sh-addrow{display:flex; gap:8px; justify-content:center; margin-top:1.4em;}
        .sh-addrow button{border:1px dashed var(--line); background:transparent; color:var(--mut);
              border-radius:8px; padding:7px 16px; font-weight:600; font-size:12px; cursor:pointer;}
        .sh-addrow button:hover{color:var(--ink); border-color:var(--mut);}
        .sh-empty{color:var(--mut); font-size:.85em; margin:1.5em 0;}
        .m-row{display:flex; align-items:stretch; margin-bottom:1.35em;}
        .meas{flex:1; min-width:0; border-left:1px solid var(--ink);
              padding:.15em .55em .1em .6em; display:flex; flex-direction:column; justify-content:flex-start;}
        .meas-ch{display:flex; align-items:flex-end; gap:.35em;}
        .rep-l + .meas{border-left:none;}
        .bar-end{width:0; border-left:1px solid var(--ink);}
        .bar-end.dbl{width:5px; border-left:1px solid var(--ink); border-right:3px solid var(--ink);}
        .pdf-stage .sheet{padding:40px 44px; border:none; box-shadow:none; border-radius:0;}
        /* \u2500\u2500 \uB3C4\uB3CC\uC774\uD45C \u2500\u2500 */
        .rep-l{width:10px; border-left:3.2px solid var(--ink); position:relative; flex:none;}
        .rep-l::before{content:""; position:absolute; left:1.6px; top:0; bottom:0; width:1px; background:var(--ink);}
        .rep-r{width:10px; border-right:3.2px solid var(--ink); position:relative; flex:none;}
        .rep-r::before{content:""; position:absolute; right:1.6px; top:0; bottom:0; width:1px; background:var(--ink);}
        .rep-l i, .rep-r i{position:absolute; width:3.4px; height:3.4px; border-radius:50%; background:var(--ink);}
        .rep-l i{left:5.6px;} .rep-r i{right:5.6px;}
        .rep-l i:first-child, .rep-r i:first-child{top:50%; margin-top:-7px;}
        .rep-l i:last-child, .rep-r i:last-child{top:50%; margin-top:3.4px;}
        .ccell{flex:1; min-width:0; display:flex; flex-direction:column; align-items:flex-start; gap:.24em;}
        .ccell.center{align-items:center;}
        .chd{font-family:'Archivo',sans-serif; font-weight:800; font-size:.92em;
             line-height:1.25; color:var(--ink); letter-spacing:0; white-space:nowrap;}
        .chd sup, .pchd sup, .pk-preview sup{font-size:.6em; vertical-align:baseline;
             position:relative; top:-.5em; font-weight:800;}
        .rep{font-family:'Archivo',sans-serif; font-weight:800; font-size:1em; color:var(--ink);}
        .anno{font-size:.66em; font-weight:600; font-style:italic; color:var(--accent); line-height:1.3;}
        .beat{font-weight:600; font-size:.92em; color:var(--mut); line-height:1.25;}
        .beat.ghost{opacity:.4; min-width:.6em; display:inline-block; font-weight:700; font-size:.85em;}
        .sheet.editable .beat.ghost:hover{text-decoration:none; opacity:1; color:var(--accent);}
        .meas-lyr{font-size:.75em; line-height:1.35; margin-top:.3em; font-weight:500;
              color:var(--ink); word-break:keep-all; white-space:pre-wrap;}
        .meas-lyr.ghosty{opacity:.35; min-height:1.3em;}
        .lyr-para{margin:.1em 0 .5em; font-size:.85em; font-weight:500; white-space:pre-wrap; color:var(--ink);}
        .cline{margin:.1em 0 .55em; line-height:1.4;}
        .pair{display:inline-block; vertical-align:bottom; white-space:pre;}
        .pchd{display:block; font-family:'Archivo',sans-serif; font-weight:800; font-size:.8em;
              line-height:1.2; min-height:1.2em; color:var(--ink); padding-right:.35em;}
        .plyr{display:block; white-space:pre; font-size:.95em;}
        .lyr-in{width:100%; font-size:.75em; font-weight:500; color:var(--ink); background:var(--field);
              border:1px solid var(--accent); border-radius:3px; padding:1px .3em; margin-top:.3em;}
        .lyr-in:focus{outline:none;}
        .para-in{width:100%; font-size:.9em; font-weight:500; color:var(--ink); background:var(--field);
              border:1px solid var(--accent); border-radius:4px; padding:2px .4em; margin:.1em 0 .5em;}
        .para-in:focus{outline:none;}
        .diag{width:3.1em; max-width:100%; height:auto; color:var(--ink); display:block;}
        /* \u2500\u2500 \uC778\uB77C\uC778 \uD3B8\uC9D1 \u2500\u2500 */
        .sheet.editable .chd, .sheet.editable .rep, .sheet.editable .anno, .sheet.editable .beat,
        .sheet.editable .sh-sect span, .sheet.editable .sh-title, .sheet.editable .sh-artist{cursor:pointer;}
        .sheet.editable .chd:hover, .sheet.editable .rep:hover, .sheet.editable .anno:hover,
        .sheet.editable .beat:hover, .sheet.editable .sh-title:hover, .sheet.editable .sh-artist:hover{
             text-decoration:underline; text-underline-offset:3px;
             text-decoration-thickness:1.5px; text-decoration-color:var(--accent);}
        .sheet.editable .meas-lyr, .sheet.editable .lyr-para, .sheet.editable .cline{cursor:pointer;}
        .sheet.editable .meas-lyr:hover, .sheet.editable .lyr-para:hover{
             text-decoration:underline; text-underline-offset:3px;
             text-decoration-thickness:1.5px; text-decoration-color:var(--accent);}
        .inline-in{font-family:'Archivo',sans-serif; font-weight:800; font-size:.92em; line-height:1.25;
             color:var(--ink); background:var(--field); border:1px solid var(--accent); border-radius:3px;
             padding:0 .25em; min-width:3ch; max-width:100%;}
        .inline-in:focus{outline:none;}
        .sect-in{font-size:.66em; letter-spacing:.08em; font-weight:700;}
        .title-in{font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:800; font-size:1.8em;
             letter-spacing:-.02em; line-height:1.12; color:var(--ink); background:var(--field);
             border:1px solid var(--accent); border-radius:4px; padding:0 .15em; width:100%; max-width:12em;}
        .title-in:focus{outline:none;}
        .artist-in{font-size:.8em; font-weight:500; color:var(--ink); background:var(--field);
             border:1px solid var(--accent); border-radius:3px; padding:1px .3em; margin-top:4px;}
        .artist-in:focus{outline:none;}
        .slot{border:none; background:none; color:var(--mut); opacity:.4; font-weight:700;
             font-size:.85em; line-height:1.25; cursor:pointer; padding:0 .1em; text-align:left;
             flex:1 1 0%; min-width:0;}
        .slot:hover{opacity:1; color:var(--accent);}
        .gline{display:flex; align-items:flex-end; gap:.3em; width:100%; min-width:0;}
        .gline .chd, .gline .rep, .gline .anno{flex:none;}
        .ccell.center .gline{justify-content:center;}
        .gsp{flex:1 1 0%; min-width:0;}
        .edit-hint{font-size:12px; color:var(--mut); font-weight:500; margin:0 0 8px 2px;}
        /* \u2500\u2500 \uD654\uBA74 \uB9DE\uCDA4 \uBCF4\uAE30 \u2500\u2500 */
        .fit-scroll{position:absolute; top:0; left:0; right:0; bottom:0; overflow:auto;
              padding:12px; -webkit-overflow-scrolling:touch;}
        .fit-inner{width:max-content; transform-origin:top left;}
        .fit-inner .sheet{min-width:0;}
        .fit-close{position:fixed; top:10px; right:10px; z-index:61; width:38px; height:38px;
              border:1px solid var(--line); background:var(--panel); color:var(--ink);
              border-radius:99px; font-size:15px; font-weight:700; cursor:pointer;
              box-shadow:0 2px 10px rgba(0,0,0,.2);}
        /* \u2500\u2500 \uC124\uC815 \uBAA8\uB2EC \u2500\u2500 */
        .modal-bg{background:rgba(10,12,15,.45);}
        .modal{background:var(--panel); border:1px solid var(--line); border-radius:10px;
               padding:20px; width:min(430px,92vw); color:var(--ink);}
        .modal h3{margin:0 0 6px; font-family:'Archivo','IBM Plex Sans KR',sans-serif;
               font-weight:800; font-size:15px;}
        .modal .desc{margin:0 0 14px; font-size:12.5px; color:var(--mut); line-height:1.6;}
        .modal .ctl{margin-bottom:10px;}
        .modal .foot{display:flex; justify-content:flex-end; gap:8px; margin-top:14px;}
        /* \u2500\u2500 \uBAA8\uBC14\uC77C \uCF54\uB4DC \uD53C\uCEE4 \u2500\u2500 */
        .picker{position:fixed; left:0; right:0; bottom:0; z-index:40;
              background:var(--panel); border-top:1px solid var(--line);
              border-radius:14px 14px 0 0; box-shadow:0 -10px 28px rgba(0,0,0,.14);
              padding:12px 14px calc(14px + env(safe-area-inset-bottom));
              max-height:72vh; overflow-y:auto;}
        .pk-head{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:4px;}
        .pk-preview{font-family:'Archivo','IBM Plex Sans KR',sans-serif; font-weight:800;
              font-size:22px; line-height:1.2; min-height:28px; color:var(--ink); min-width:0;
              overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
        .pk-hint{font-size:13px; font-weight:500; color:var(--mut);}
        .pk-label{font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--mut);
              text-transform:uppercase; margin:12px 0 6px;}
        .pk-grid{display:grid; gap:6px;}
        .pk-grid.roots{grid-template-columns:repeat(7,1fr);}
        .pk-acc{display:flex; gap:6px; margin-top:6px;}
        .pk-acc button{flex:1; border:1px solid var(--line); background:var(--field); border-radius:8px;
              min-height:38px; font-family:'Archivo','IBM Plex Sans KR',sans-serif;
              font-weight:700; font-size:15px; color:var(--ink); cursor:pointer;}
        .pk-acc button.on{background:var(--ink); border-color:var(--ink); color:var(--bg);}
        .pk-acc button.off{opacity:.4; cursor:default;}
        .pk-grid.quals{grid-template-columns:repeat(4,1fr);}
        .pk-grid.bass{grid-template-columns:repeat(8,1fr);}
        .pk-grid button{border:1px solid var(--line); background:var(--field); border-radius:8px;
              min-height:42px; padding:8px 2px; font-family:'Archivo','IBM Plex Sans KR',sans-serif;
              font-weight:700; font-size:14px; color:var(--ink); cursor:pointer;}
        .pk-grid.quals button{font-size:13px;}
        .pk-grid.bass button{min-height:34px; padding:5px 2px; font-size:12px;}
        .pk-grid button.on{background:var(--ink); border-color:var(--ink); color:var(--bg);}
        .pk-row{display:flex; gap:6px; margin-top:14px;}
        .pk-row button{flex:1; border:1px solid var(--line); background:transparent; border-radius:8px;
              padding:10px 4px; font-weight:600; font-size:12.5px; color:var(--ink); cursor:pointer;}
        .pk-row button:hover{background:var(--hover);}
        @media (min-width:768px){
          .picker{left:50%; right:auto; transform:translateX(-50%); width:520px;
                bottom:16px; border:1px solid var(--line); border-radius:14px;
                box-shadow:0 14px 40px rgba(0,0,0,.20); max-height:78vh;}
        }
        /* \u2500\u2500 \uD1A0\uC2A4\uD2B8 \u2500\u2500 */
        .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
               background:var(--ink); color:var(--bg); font-size:13px; font-weight:600;
               padding:9px 18px; border-radius:99px; z-index:60; box-shadow:0 6px 18px rgba(0,0,0,.22);}
        /* \u2500\u2500 \uC778\uC1C4: \uD56D\uC0C1 \uB77C\uC774\uD2B8 \u2500\u2500 */
        @media print{
          .light,.dark{
            --bg:#FFFFFF; --panel:#FFFFFF; --sheet:#FFFFFF; --field:#FFFFFF;
            --ink:#17191C; --mut:#878E96; --line:#E3E5E8; --hover:#F0F1F3;
            --accent:#E5352B; --on-accent:#FFFFFF;
          }
          .no-print{display:none !important;}
          .app{background:#fff;}
          .preview-col{display:block !important;}
          .editor-col{display:none !important;}
          .sheet{box-shadow:none; border:none; border-radius:0; padding:0;}
          .sh-sect span{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
