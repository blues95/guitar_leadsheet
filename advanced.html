        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap');
        .light{--bg:#F4F5F6;--panel:#FFFFFF;--sheet:#FFFFFF;--field:#FFFFFF;--ink:#17191C;--mut:#878E96;--line:#E3E5E8;--hover:#F0F1F3;--accent:#E5352B;--on-accent:#FFFFFF;}
        .dark{--bg:#0E1013;--panel:#14161A;--sheet:#171A1F;--field:#14161A;--ink:#E9EBEE;--mut:#8A9098;--line:#272B31;--hover:#1D2126;--accent:#F0524A;--on-accent:#FFFFFF;}
        .app{font-family:'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
        .topbar{background:var(--panel);border-bottom:1px solid var(--line);}
        .btn{border:1px solid var(--line);background:transparent;border-radius:6px;padding:7px 13px;font-weight:600;font-size:12.5px;color:var(--ink);cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;}
        .btn:hover{background:var(--hover);}
        .logo{display:block; line-height:0; border-radius:9px;}
        .logo:hover{opacity:.85;}
        .btn-primary{background:var(--ink);border-color:var(--ink);color:var(--bg);}
        .sel{border:1px solid var(--line);background:var(--field);border-radius:6px;padding:7px 9px;font-weight:600;font-size:12.5px;color:var(--ink);cursor:pointer;}
        .ctl{display:flex;flex-direction:column;gap:3px;}
        .ctl>label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;}
        .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--field);}
        .seg button{border:none;background:transparent;padding:7px 11px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;}
        .seg button.on{background:var(--ink);color:var(--bg);}
        .seg .val{padding:7px 10px;font-weight:800;font-family:'Archivo',sans-serif;min-width:40px;text-align:center;border-left:1px solid var(--line);border-right:1px solid var(--line);cursor:pointer;font-size:12.5px;}
        .seg .val.hot{color:var(--accent);}
        .hint{font-size:12px;color:var(--mut);font-weight:600;}
        .meta-in{width:100%;border:1px solid var(--line);border-radius:6px;background:var(--field);padding:8px 12px;font-size:14px;font-weight:600;color:var(--ink);}
        .meta-in::placeholder{color:var(--mut);font-weight:500;}
        .ed{width:100%;min-height:430px;resize:vertical;background:var(--field);border:1px solid var(--line);border-radius:8px;padding:14px 16px;color:var(--ink);font:13.5px/1.9 ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
        .tiny{font-size:12px;color:var(--mut);background:none;border:none;cursor:pointer;padding:2px 4px;font-weight:600;text-decoration:none;}
        .tiny:hover{color:var(--ink);text-decoration:underline;}
        .helpbox{border:1px solid var(--line);border-radius:8px;background:var(--hover);padding:12px 14px 14px;font-size:12.5px;line-height:1.6;color:var(--ink);}
        .helpbox code{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font:12px ui-monospace,Menlo,monospace;color:var(--accent);}
        .hb-t{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--mut);text-transform:uppercase;margin:12px 0 5px;}
        .hb-t:first-child{margin-top:0;}
        .hb-row{display:flex;gap:10px;align-items:baseline;margin:4px 0;}
        .hb-row>code{flex:none;} .hb-row>span{flex:1;min-width:0;}
        .tabbar{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--field);}
        .tabbar button{border:none;background:transparent;padding:9px 0;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;}
        .tabbar button.on{background:var(--ink);color:var(--bg);}
        .tabbar button.tb-main{flex:2.6;font-size:14.5px;padding:11px 0;}
        .tabbar button.tb-sub{flex:1;font-size:12px;}
        /* \uC2DC\uD2B8 */
        .sheet{background:var(--sheet);border:1px solid var(--line);border-radius:6px;padding:clamp(24px,4.5vw,44px);color:var(--ink);}
        .light .sheet{box-shadow:0 1px 2px rgba(18,22,28,.05);}
        .sheet-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
        .sh-title{font-family:'Archivo','IBM Plex Sans KR',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.02em;margin:0;}
        .sh-artist{margin:4px 0 0;color:var(--mut);font-size:12px;font-weight:500;}
        .sh-meta b{font-family:'Archivo',sans-serif;font-weight:800;color:var(--accent);}
        .sh-rule{border-top:2px solid var(--ink);margin:9px 0 20px;}
        .sh-sect{margin:18px 0 10px;}
        .sh-sect span{display:inline-block;background:var(--accent);color:var(--on-accent);border-radius:2px;padding:2.5px 10px;font-family:'Archivo','IBM Plex Sans KR',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
        .sh-gap{height:12px;}
        .m-row{display:flex;align-items:stretch;margin-bottom:8px;}
        .meas{border-left:1px solid var(--ink);min-width:0;}
        .bar-end{width:0;border-left:1px solid var(--ink);}
        .bar-end.dbl{width:5px;border-left:1px solid var(--ink);border-right:3px solid var(--ink);}
        .rep-l{width:15px;border-left:3.5px solid var(--ink);position:relative;flex:none;}
        .rep-l::before{content:"";position:absolute;left:3px;top:0;bottom:0;width:1.2px;background:var(--ink);}
        .rep-r{width:15px;border-right:3.5px solid var(--ink);position:relative;flex:none;}
        .rep-r::before{content:"";position:absolute;right:3px;top:0;bottom:0;width:1.2px;background:var(--ink);}
        .rep-l i,.rep-r i{position:absolute;width:3.6px;height:3.6px;border-radius:50%;background:var(--ink);}
        .rep-l i{left:8.5px;} .rep-r i{right:8.5px;}
        .rep-l i:first-child,.rep-r i:first-child{top:50%;margin-top:-7px;}
        .rep-l i:last-child,.rep-r i:last-child{top:50%;margin-top:3.4px;}
        .rm{display:block;color:var(--ink);overflow:visible;}
        .rm-g{stroke:currentColor;}
        .rm-f{fill:currentColor;}
        .rm-bg{stroke:var(--sheet);}
        .rm-guide{stroke:currentColor;opacity:.13;stroke-width:1;}
        .rm-ch{font-family:'Archivo',sans-serif;font-weight:800;fill:currentColor;}
        .fit-wrap{position:fixed;inset:0;z-index:45;background:var(--bg);}
        .fit-scroll{width:100%;height:100%;overflow:auto;padding:12px;}
        .fit-inner{transform-origin:top left;}
        .fit-close{position:fixed;top:14px;right:14px;z-index:46;width:40px;height:40px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.18);}
        .fit-close:hover{color:var(--accent);}
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px;}
        .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;width:min(480px,100%);max-height:85vh;overflow-y:auto;}
        .modal h2{margin:0 0 6px;font-size:16px;}
        .m-desc{font-size:12.5px;color:var(--mut);margin:0 0 12px;line-height:1.6;}
        .m-desc code{color:var(--accent);font:12px ui-monospace,Menlo,monospace;}
        .m-label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--mut);text-transform:uppercase;margin:10px 0 4px;}
        .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:12.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:88vw;text-align:center;}
        .rz-wrap{position:absolute;top:0;bottom:0;display:flex;}
        .rz{flex:1 1 0%;min-width:0;border:none;background:transparent;cursor:pointer;padding:0;touch-action:pan-y;}
        .rz:hover{background:rgba(127,127,127,.08);}
        .rz.hot{background:rgba(127,127,127,.18);}
        .picker{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--panel);border-top:1px solid var(--line);border-radius:14px 14px 0 0;box-shadow:0 -10px 28px rgba(0,0,0,.14);padding:12px 14px calc(14px + env(safe-area-inset-bottom));max-height:72vh;overflow-y:auto;}
        .pk-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;}
        .pk-preview{font-family:'Archivo','IBM Plex Sans KR',sans-serif;font-weight:800;font-size:22px;line-height:1.2;min-height:28px;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .pk-preview sup{font-size:.6em;vertical-align:baseline;position:relative;top:-.5em;font-weight:800;}
        .pk-hint{font-size:13px;font-weight:600;color:var(--mut);}
        .pk-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;margin:12px 0 6px;}
        .pk-grid{display:grid;gap:6px;}
        .pk-grid.roots{grid-template-columns:repeat(7,1fr);}
        .pk-grid.quals{grid-template-columns:repeat(4,1fr);}
        .pk-grid.bass{grid-template-columns:repeat(8,1fr);}
        .pk-grid button{border:1px solid var(--line);background:var(--field);border-radius:8px;min-height:42px;padding:8px 2px;font-family:'Archivo','IBM Plex Sans KR',sans-serif;font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;}
        .pk-grid.quals button{font-size:13px;}
        .pk-grid.bass button{min-height:34px;padding:5px 2px;font-size:12px;}
        .pk-grid button.on{background:var(--ink);border-color:var(--ink);color:var(--bg);}
        .pk-acc{display:flex;gap:6px;margin-top:6px;}
        .pk-acc button{flex:1;border:1px solid var(--line);background:var(--field);border-radius:8px;min-height:38px;font-family:'Archivo','IBM Plex Sans KR',sans-serif;font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;}
        .pk-acc button.on{background:var(--ink);border-color:var(--ink);color:var(--bg);}
        .pk-acc button.off{opacity:.4;cursor:default;}
        .pk-row{display:flex;gap:6px;margin-top:10px;}
        .pk-row button{flex:1;border:1px solid var(--line);background:transparent;border-radius:8px;padding:10px 4px;font-weight:600;font-size:12.5px;color:var(--ink);cursor:pointer;}
